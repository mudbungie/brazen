[workspace]

[package]
name = "brazen"
version = "0.1.0"
edition = "2021"
description = "A stateless, swiss-army-knife adapter for every LLM provider and protocol."
license = "MIT"
publish = false
# The `bz` bin is split across `src/bin/{main,native}.rs` (the impure shim, all
# coverage-excluded). Disable bin auto-discovery so `native.rs` is a MODULE of the
# one declared bin, not a second binary (arch §10).
autobins = false

[lib]
name = "brazen"
path = "src/lib.rs"

[[bin]]
name = "bz"
path = "src/bin/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
# PKCE S256 (RFC 7636): challenge = BASE64URL-NOPAD(SHA256(verifier)). Both are
# pure-Rust, no C deps (the musl/cross-compile story, arch §10, holds), and their
# code is not counted toward the lib's 100% line coverage — only our call sites.
sha2 = "0.10"
base64 = "0.22"

# The blocking, rustls-backed HTTP client used ONLY by the `bz` bin shim's
# `HttpTransport` (src/bin/main.rs), behind the lib's `Transport` seam. Pinned to
# pure-Rust TLS — `rustls` + bundled `webpki-roots`, no OpenSSL/`pkg-config`, no
# async runtime (arch §10) — so the single-binary musl/Windows/macOS story holds.
# The lib never links it; it reaches 100% coverage behind `MockTransport`.
ureq = { version = "3", default-features = false, features = ["rustls"] }

# Unix-only, used ONLY by the `bz` bin shim (src/bin/main.rs) to restore the
# default SIGPIPE disposition (arch §5.8). The lib forbids unsafe and never links
# it; libc carries no C deps, so the musl/cross-compile story (arch §10) holds.
[target.'cfg(unix)'.dependencies]
libc = "0.2"
