[workspace]

[package]
name = "brazen"
version = "0.1.0"
edition = "2021"
description = "A stateless, swiss-army-knife adapter for every LLM provider and protocol."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "brazen"
path = "src/lib.rs"

[[bin]]
name = "bz"
path = "src/bin/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
