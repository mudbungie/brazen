name: Release binaries

# crates.io is for `cargo install brazen`; this is for everyone else. When
# release-plz cuts a GitHub Release (see release-plz.yml), build the `bz` binary for
# every supported target and attach the archives to that Release, so a user without
# a Rust toolchain can download a prebuilt `bz` directly.
#
# Same target matrix as ci.yml's build/test matrix — every entry is a NATIVE runner,
# so the binaries are built (not cross-emulated) on the platform they ship for.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-musl }
          - { runner: macos-13,         target: x86_64-apple-darwin }
          - { runner: macos-14,         target: aarch64-apple-darwin }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc }
          - { runner: windows-11-arm,   target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # Builds `cargo build --release --target <t> --bin bz`, archives it (.tar.gz on
      # Unix, .zip on Windows) as bz-<target>, and uploads it to the triggering
      # Release. Keyed to the release tag via GITHUB_TOKEN.
      - name: Build and upload bz
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: bz
          target: ${{ matrix.target }}
          archive: bz-$target
          token: ${{ secrets.GITHUB_TOKEN }}
