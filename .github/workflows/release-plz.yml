name: Release-plz

# Automated versioning + publishing — replaces the old manual "push a v* tag ->
# cargo publish" flow. release-plz reads the conventional-commit history and, on
# every push to main, runs two independent jobs:
#
#   * release-plz-pr — opens/updates a single "release PR" that bumps the version in
#     Cargo.toml and writes the CHANGELOG. Nothing publishes until that PR is merged.
#   * release-plz-release — publishes any version on main that is NOT yet on
#     crates.io (so merging the release PR ships it), tags it `v<version>`, and cuts
#     a GitHub Release. That Release triggers `release-binaries.yml`, which attaches
#     the prebuilt `bz` binaries.
#
# The repo's quality gate (`make check`: fmt + clippy + 100% coverage) already runs
# on every push to main via ci.yml, so what release-plz publishes is gated code;
# `cargo publish` additionally re-verifies the packaged crate compiles.
#
# One-time setup:
#   * Settings -> Actions -> General -> Workflow permissions: enable "Allow GitHub
#     Actions to create and approve pull requests" — else the release-pr job 403s
#     ("GitHub Actions is not permitted to create or approve pull requests"). A
#     RELEASE_PLZ_TOKEN below also satisfies this.
#   * CARGO_REGISTRY_TOKEN (Settings -> Secrets and variables -> Actions) — a
#     crates.io API token (publish scope) owned by the crate owner (mudbungie).
#     REQUIRED to publish.
#   * RELEASE_PLZ_TOKEN — RECOMMENDED: a fine-grained PAT (contents+PR write) or
#     GitHub App token, so the release PR's commits re-trigger CI. The default
#     GITHUB_TOKEN cannot trigger workflows from its own pushes; the job falls back
#     to it if RELEASE_PLZ_TOKEN is unset.

#
# HOLD: pushing to main NEVER publishes — it only refreshes the release PR. The
# actual crates.io publish runs only on a manual `workflow_dispatch` (Actions ->
# Release-plz -> Run workflow), the deliberate "click release". Flip nothing to go
# live; just add CARGO_REGISTRY_TOKEN and click when ready.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: release-plz release (publish)
    runs-on: ubuntu-latest
    # The deliberate go-live click: publish ONLY when a maintainer manually runs the
    # workflow. A push to main skips this job entirely, so it can never auto-release.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    # Never run two release-PR updates at once (they'd race on the same branch).
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
