name: Release-plz

# Fully automated, build-gated release with release-plz. Three jobs:
#
#   * release-pr (on every push to main) — opens/updates one "release PR" that bumps
#     the version in Cargo.toml and stages a CHANGELOG.md entry for it (this repo's
#     history is not conventional-commits, so CHANGELOG.md is hand-curated — see the
#     file's own header; release-plz prepends the bump, you write the prose). It
#     never publishes; it just keeps the next release staged.
#   * release / publish (when CI succeeds on main) — publishes any version on main
#     that is NOT yet on crates.io, tags it `v<version>`, and cuts a GitHub Release.
#     Gated on `workflow_run` of the CI workflow concluding `success`, so a release
#     only ever ships a GREEN build — never an untested commit.
#   * release-binaries — builds the `bz` binary for every target and attaches the
#     archives to that Release. It runs in the SAME workflow run, `needs:` the
#     publish job and gated on its `releases_created` output — NOT a separate
#     `on: release` workflow, because a Release created by the default GITHUB_TOKEN
#     cannot trigger another workflow (GitHub's anti-recursion rule), so a separate
#     binaries workflow would silently never fire without a PAT. Folding it in needs
#     no PAT. `workflow_dispatch` with `binaries_tag` backfills an existing tag.
#
# So the hands-off flow is: merge work to main -> CI runs -> the release PR is kept
# fresh; merge the release PR -> CI runs -> on green, the new version auto-publishes
# AND its binaries build. The release-PR merge is the human control point;
# `CARGO_REGISTRY_TOKEN` is the enable switch (no token -> nothing to publish).
# `release` is idempotent — it no-ops on a build whose version is already published.
#
# One-time setup:
#   * Settings -> Actions -> General -> Workflow permissions: enable "Allow GitHub
#     Actions to create and approve pull requests" — else the release-pr job 403s
#     ("GitHub Actions is not permitted to create or approve pull requests"). A
#     RELEASE_PLZ_TOKEN below also satisfies this.
#   * CARGO_REGISTRY_TOKEN (Settings -> Secrets and variables -> Actions) — a
#     crates.io API token (publish scope) owned by the crate owner (mudbungie).
#     REQUIRED to publish; setting it ARMS auto-publish.
#   * RELEASE_PLZ_TOKEN — RECOMMENDED: a fine-grained PAT (contents+PR write) or
#     GitHub App token, so the release PR's commits re-trigger CI. The default
#     GITHUB_TOKEN cannot trigger workflows from its own pushes; the job falls back
#     to it if RELEASE_PLZ_TOKEN is unset.

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      binaries_tag:
        description: "Build + upload prebuilt bz binaries for this existing tag (e.g. v0.0.1). Leave empty for a normal publish."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    # Only a direct push to main maintains the release PR (not the CI workflow_run).
    # Owner guard: never runs in a fork. Safe vs fork-PR abuse because none of this
    # workflow's triggers are reachable from a fork PR — a fork PR fires
    # `pull_request` (read-only token, not requested here), never `push`-to-main /
    # `workflow_run` / `workflow_dispatch`, which all require write access to upstream.
    if: github.repository_owner == 'mudbungie' && github.event_name == 'push'
    # Never run two release-PR updates at once (they'd race on the same branch).
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    name: release-plz release (publish)
    runs-on: ubuntu-latest
    # Publish only on a GREEN build: a CI run that concluded `success` on main, or a
    # manual override. A push event alone never reaches here. Owner guard (same reason
    # as the PR job): never runs in a fork, and no trigger here is reachable from a
    # fork PR — so the write/registry tokens are never exposed to untrusted code.
    if: >-
      github.repository_owner == 'mudbungie' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    # One publish at a time.
    concurrency:
      group: release-plz-publish
      cancel-in-progress: false
    # Surface whether a release actually happened, so the binaries job knows to run.
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the BRANCH, not a bare SHA: release-plz runs `git rev-parse
          # @{upstream}` to find the current branch, which fails on a detached HEAD.
          # `head_branch` is the branch CI ran on (main) for workflow_run; `ref_name`
          # is main for a manual dispatch. release-plz then publishes main's tip.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-binaries:
    name: bz ${{ matrix.target }}
    needs: release-plz-release
    # Build binaries when a release was just published, OR for a tag named manually
    # (backfill). `needs` is skipped if the publish job was skipped (e.g. non-owner),
    # so this can never run in a fork either.
    if: >-
      needs.release-plz-release.outputs.releases_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.binaries_tag != '')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-musl }
          # x86-mac is cross-built on the Apple-Silicon runner (no Intel runner; the
          # Apple toolchain cross-compiles x86_64 cleanly), so Intel-Mac users still
          # get a prebuilt `bz`.
          - { runner: macos-14,         target: x86_64-apple-darwin }
          - { runner: macos-14,         target: aarch64-apple-darwin }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc }
          - { runner: windows-11-arm,   target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve + check out the release tag
        id: tag
        shell: bash
        run: |
          tag="${{ github.event.inputs.binaries_tag }}"
          [ -n "$tag" ] || tag="$(git describe --tags --abbrev=0)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          # Build the tagged (released) code, not whatever main's tip is now.
          git checkout "$tag"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # Builds `cargo build --release --target <t> --bin bz`, archives it (.tar.gz on
      # Unix, .zip on Windows) as bz-<target>, and uploads it to the Release for the
      # resolved tag (`ref`). Uploading assets via GITHUB_TOKEN is fine — only
      # *triggering a new workflow* from a token-made event is what GitHub blocks.
      - name: Build and upload bz
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: bz
          target: ${{ matrix.target }}
          archive: bz-$target
          ref: refs/tags/${{ steps.tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

  prune-release-branches:
    name: prune superseded release branches
    # `needs` with no `if` means: only after the release-PR job actually ran and
    # succeeded. On the workflow_run/dispatch triggers that job is skipped, so
    # this one is too — pruning only ever follows a PR refresh.
    needs: release-plz-pr
    # release-plz pushes a NEW timestamped `release-plz-*` branch every time it
    # refreshes the release PR and leaves the previous one behind. Worse, it
    # pushes the branch BEFORE opening the PR, so if PR creation fails (as it
    # did across brazen before "Allow GitHub Actions to create and approve pull
    # requests" was enabled — 24 orphaned branches, zero PRs) the branch is
    # stranded with no PR to ever close or merge. Unattended, that is one dead
    # branch per push to main.
    #
    # The repo's "Automatically delete head branches" setting only fires on
    # MERGE, which covers the happy path and nothing else. This job covers the
    # rest: it runs immediately after the PR job, so the branch backing the
    # CURRENT release PR is already open, and "has no open PR" is therefore an
    # exact test for "superseded or orphaned". No allowlist, no age heuristic,
    # no state to keep — the open-PR set is the single source of truth.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Delete every release-plz-* branch with no open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          open="$(gh pr list --state open --json headRefName -q '.[].headRefName')"
          git ls-remote --heads origin 'refs/heads/release-plz-*' |
            awk '{print $2}' | sed 's#refs/heads/##' |
            while read -r branch; do
              if grep -qxF "$branch" <<<"$open"; then
                echo "keep    $branch (backs an open PR)"
              else
                echo "delete  $branch"
                git push origin --delete "$branch"
              fi
            done
