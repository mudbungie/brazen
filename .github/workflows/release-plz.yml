name: Release-plz

# Fully automated, build-gated release with release-plz. Two independent jobs:
#
#   * release-pr (on every push to main) — opens/updates one "release PR" that bumps
#     the version in Cargo.toml and writes the CHANGELOG from the conventional-commit
#     history. It never publishes; it just keeps the next release staged.
#   * release / publish (when CI succeeds on main) — publishes any version on main
#     that is NOT yet on crates.io, tags it `v<version>`, and cuts a GitHub Release
#     (which `release-binaries.yml` then attaches the prebuilt `bz` binaries to).
#     It is gated on `workflow_run` of the CI workflow concluding `success`, so a
#     release only ever ships a GREEN build — never an untested commit.
#
# So the hands-off flow is: merge work to main -> CI runs -> the release PR is kept
# fresh; merge the release PR -> CI runs -> on green, the new version auto-publishes.
# The release-PR merge is the human control point; `CARGO_REGISTRY_TOKEN` is the
# enable switch (no token -> the publish step simply has nothing it can ship).
# `release` is idempotent — it no-ops on a build whose version is already published —
# so running it on every green main build is safe.
#
# One-time setup:
#   * Settings -> Actions -> General -> Workflow permissions: enable "Allow GitHub
#     Actions to create and approve pull requests" — else the release-pr job 403s
#     ("GitHub Actions is not permitted to create or approve pull requests"). A
#     RELEASE_PLZ_TOKEN below also satisfies this.
#   * CARGO_REGISTRY_TOKEN (Settings -> Secrets and variables -> Actions) — a
#     crates.io API token (publish scope) owned by the crate owner (mudbungie).
#     REQUIRED to publish; setting it ARMS auto-publish.
#   * RELEASE_PLZ_TOKEN — RECOMMENDED: a fine-grained PAT (contents+PR write) or
#     GitHub App token, so the release PR's commits re-trigger CI. The default
#     GITHUB_TOKEN cannot trigger workflows from its own pushes; the job falls back
#     to it if RELEASE_PLZ_TOKEN is unset.

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    # Only a direct push to main maintains the release PR (not the CI workflow_run).
    if: github.event_name == 'push'
    # Never run two release-PR updates at once (they'd race on the same branch).
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    name: release-plz release (publish)
    runs-on: ubuntu-latest
    # Publish only on a GREEN build: a CI run that concluded `success` on main, or a
    # manual override. A push event alone never reaches here.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    # One publish at a time.
    concurrency:
      group: release-plz-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Publish exactly the commit CI went green on (workflow_run), else main's tip.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
