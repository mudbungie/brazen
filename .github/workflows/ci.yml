name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# The gate (fmt + clippy + 100% coverage) is platform-independent — the lib is
# pure and the only native code lives in the coverage-excluded `bz` shim — so it
# runs once. The matrix proves the workspace *builds and tests green* on every
# target; it does not re-run the gate (arch §10: "the native surface is
# deliberately tiny", so the matrix stays green for free).
jobs:
  gate:
    name: make check (fmt + clippy + 100% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: make check

  # Supply-chain gate: brazen handles credentials (0600 cred files, OAuth tokens) and
  # talks to the network, so a RUSTSEC-flagged or yanked transitive dependency must
  # fail CI before it can ride a release out. Audits the committed Cargo.lock against
  # the RustSec advisory DB; `--deny warnings` makes unmaintained/yanked crates fail
  # too, not just vulnerabilities. (Runs on the advisory DB of the day, so it can flag
  # a newly-disclosed issue in unchanged code — that is the point.)
  audit:
    name: cargo audit (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  # Keep the declared `rust-version` (Cargo.toml MSRV) honest: build on exactly that
  # toolchain, read from the manifest so the floor lives in one place. A code change
  # that needs a newer compiler fails here until `rust-version` is bumped to match.
  msrv:
    name: MSRV build (rust-version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read rust-version from Cargo.toml
        id: msrv
        run: echo "v=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.v }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked

  matrix:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    # A stuck/sunset runner (e.g. the deprecated macos-13 Intel image) once hung for
    # ~24h before the run-level limit cancelled it; bound each job so a hang fails
    # fast and surfaces a real signal instead of pinning the whole run.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Linux / macOS / Windows × x86_64 / aarch64, plus the static-musl story.
        # Every entry is a NATIVE runner, so `cargo test` actually runs (no
        # cross-emulation) — portability is proven by execution, not just linking.
        include:
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-musl }
          - { runner: macos-13,         target: x86_64-apple-darwin }
          - { runner: macos-14,         target: aarch64-apple-darwin }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc }
          - { runner: windows-11-arm,   target: aarch64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --workspace --locked --target ${{ matrix.target }}
      - run: cargo test --workspace --locked --target ${{ matrix.target }}
